[tool.poetry]
name = "python-alteon"
version = "0.1.0"
description = "Python interface to the Radware Alteon REST API"
license = "BSD"
authors = ["Andrew Teixeira <teixeira@broadinstitute.org>"]
readme = "README.md"
repository = "https://github.com/broadinstitute/python-alteon"
homepage = "https://github.com/broadinstitute/python-alteon"
keywords = ["radware", "alteon"]

[tool.poetry.dependencies]
python = "^3.6"  # Compatible python versions must be declared here
toml = "^0.9"

[tool.poetry.dev-dependencies]
bump2version = "*"
coverage = "*"
fixtures = "*"
flake8 = "*"
green = "*"
mock = "*"
pydocstyle = "*"
pylama = "*"
pylint = "*"
requests = "*"
responses = "*"
setuptools = "*"
testtools = "*"
twine = "*"
unittest2 = "*"
wheel = "*"
yamllint = "*"
